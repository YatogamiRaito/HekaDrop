bench = false

[[bin]]
name = "fuzz_resume_meta"
path = "fuzz_targets/fuzz_resume_meta.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_protobuf_frames"
path = "fuzz_targets/fuzz_protobuf_frames.rs"
test = false
doc = false
