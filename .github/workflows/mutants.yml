name: Mutation Testing

on:
  schedule:
    # Her Pazar gece yarısı (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Manuel çalıştırma desteği

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  mutants:
    name: cargo-mutants (hekadrop-core)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Run mutants
        # Sadece pure logic ve ukey2/crypto mantığının olduğu hekadrop-core hedeflenir
        run: cargo mutants -vV --package hekadrop-core --no-shuffle

      - name: Archive mutants output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutants-report
          path: mutants.out/
          retention-days: 7
