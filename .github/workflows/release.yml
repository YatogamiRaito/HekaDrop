name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Platform build jobs — her biri yalnız artefakt üretir, release upload'ı
  # publish-release job'u yapar (tek CHECKSUMS.txt + tek release sayfası).
  # ─────────────────────────────────────────────────────────────────────────

  build-macos:
    name: Build macOS (.dmg + src tarball)
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install tools
        run: brew install protobuf pngquant

      - name: Universal2 binary (Intel + ARM64)
        run: ./scripts/build-universal.sh

      - name: Build .app
        run: ./scripts/bundle.sh

      - name: Build DMG
        run: ./scripts/make-dmg.sh

      # TODO: notarize with Apple Developer ID — kullanıcı Developer ID sağlayınca etkinleştir.
      # - name: Notarize DMG
      #   env:
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #   run: |
      #     xcrun notarytool submit "$(ls target/HekaDrop-*.dmg | head -1)" \
      #       --apple-id "$APPLE_ID" \
      #       --password "$APPLE_APP_SPECIFIC_PASSWORD" \
      #       --team-id "$APPLE_TEAM_ID" \
      #       --wait
      #     xcrun stapler staple "$(ls target/HekaDrop-*.dmg | head -1)"

      - name: Create source tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="target/HekaDrop-${VERSION}-src.tar.gz"
          git archive --format=tar.gz --prefix="HekaDrop-${VERSION}/" -o "$TARBALL" HEAD
          ls -la "$TARBALL"

      # macOS dSYM üniversal assemble şu an v0.6.0 için devre dışı — H#3 workflow
      # config'i split-debuginfo ile uyumsuz; düzgün implementasyon v0.6.1.

      - name: Stage macOS artifacts
        run: |
          mkdir -p release-artifacts
          cp target/HekaDrop-*.dmg release-artifacts/
          cp target/HekaDrop-*-src.tar.gz release-artifacts/
          ls -la release-artifacts/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-macos
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 1

  build-linux:
    name: Build Linux (.deb + raw binary)
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            zenity

      - name: Build (release)
        run: cargo build --release

      - name: Build .deb package
        run: |
          chmod +x scripts/make-deb.sh
          ./scripts/make-deb.sh

      # Debug symbols (DWARF/dwp) şu an v0.6.0 için devre dışı — H#3 workflow
      # config'i split-debuginfo ile uyumsuz; düzgün implementasyon v0.6.1.
      # Atlama yerine adım tamamen kaldırıldı (sessiz fail yerine net davranış).

      - name: Stage Linux artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-artifacts
          cp HekaDrop-"${VERSION}".deb release-artifacts/
          cp target/release/hekadrop "release-artifacts/hekadrop-${VERSION}-linux-x86_64"
          ls -la release-artifacts/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-linux
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 1

  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: choco install protoc -y --no-progress

      - name: Build (release)
        run: cargo build --release

      - name: Stage Windows artifact
        shell: pwsh
        run: |
          $Version = "${env:GITHUB_REF_NAME}" -replace '^v',''
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          # Scoop manifest HekaDrop-$version.exe bekliyor (scoop/hekadrop.json)
          Copy-Item "target/release/hekadrop.exe" "release-artifacts/HekaDrop-$Version.exe"
          $Pdb = "target/release/hekadrop.pdb"
          if (-not (Test-Path $Pdb)) {
            Write-Error "HATA: $Pdb bulunamadı — profile.release.debug ayarı PDB üretmedi."
            Get-ChildItem target/release | Select-Object -First 40
            exit 1
          }
          $PdbZip = "release-artifacts/HekaDrop-$Version-windows-x86_64.pdb.zip"
          Compress-Archive -Path $Pdb -DestinationPath $PdbZip -CompressionLevel Optimal -Force
          Get-ChildItem release-artifacts

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-windows
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Finalize: bütün platformların çıktısını birleştirir, tek CHECKSUMS.txt
  # üretir ve GitHub Release'e yükler.
  # ─────────────────────────────────────────────────────────────────────────

  publish-release:
    name: Publish GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-macos
          path: release-assets/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-linux
          path: release-assets/

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: release-windows
          path: release-assets/

      - name: Generate unified CHECKSUMS.txt
        run: |
          cd release-assets
          : > CHECKSUMS.txt
          # Deterministik sıralama (platform bağımsız okunabilirlik için).
          for f in $(ls | sort); do
            if [ -f "$f" ] && [ "$f" != "CHECKSUMS.txt" ]; then
              sha256sum "$f" >> CHECKSUMS.txt
            fi
          done
          echo "── CHECKSUMS.txt ──"
          cat CHECKSUMS.txt
          echo "── release-assets/ ──"
          ls -la

      - name: Compute version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            Ayrıntılar için [CHANGELOG](https://github.com/YatogamiRaito/HekaDrop/blob/v${{ steps.ver.outputs.version }}/CHANGELOG.md).

            Windows PDB sidecar'ı (crash triage) bu yayında mevcut; macOS dSYM
            ve Linux dwp debug sembolleri v0.6.1'e ertelendi (split-debuginfo
            workflow uyumsuzluğu).
