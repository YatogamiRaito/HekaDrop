# Fuzz CI — v0.9.0 altyapısı (10 harness).
#
# On-demand only: either manually via workflow_dispatch or by applying the
# `fuzz` label on a pull request. NOT wired into main/push; we do not want
# to gate unrelated PRs on fuzz runs while the corpus is still growing.
#
# continue-on-error: TRUE — corpus henüz küçük; v0.9.x'te yeterli corpus
# birikince `required` yapılacak (ROADMAP Q2 deliverable).
name: fuzz

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize]

jobs:
  fuzz:
    # PR tetikleyicisini yalnız `fuzz` etiketi varsa çalıştır; workflow_dispatch
    # her zaman geçer.
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'fuzz')
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_ukey2_client_init
          - fuzz_ukey2_client_finish
          - fuzz_frame_decode
          - fuzz_secure_decrypt
          - fuzz_payload_header
          - fuzz_payload_assembler
          - fuzz_chunk_hmac
          - fuzz_resume_meta
          - fuzz_protobuf_frames
          - fuzz_endpoint_info
    steps:
      - uses: actions/checkout@v6

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: fuzz-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.toml') }}
          restore-keys: |
            fuzz-cargo-${{ runner.os }}-

      - name: Cache target dirs
        uses: actions/cache@v5
        with:
          path: |
            target
            fuzz/target
          key: fuzz-target-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            fuzz-target-${{ runner.os }}-${{ matrix.target }}-
            fuzz-target-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Build all harnesses
        run: cargo +nightly fuzz build

      - name: Run ${{ matrix.target }} (300s cap)
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=300

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v8
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 14
