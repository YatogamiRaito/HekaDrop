name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Node 20 kalktıktan sonra dahi çalışması için Node 24'e zorla.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  coverage:
    name: Code Coverage (llvm-cov)
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: brew install protobuf

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage (LCOV)
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Generate coverage (Cobertura)
        run: cargo llvm-cov report --cobertura --output-path cobertura.xml

      - name: Upload LCOV artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 14

      - name: Upload Cobertura artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-cobertura
          path: cobertura.xml
          retention-days: 14

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
          verbose: true
