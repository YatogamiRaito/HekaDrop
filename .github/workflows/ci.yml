name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Node 20 kalktıktan sonra dahi çalışması için Node 24'e zorla.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test + Build (macOS)
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: brew install protobuf

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Build (release)
        run: cargo build --release

      - name: Bundle .app
        run: ./scripts/bundle.sh

      - name: Upload .app artifact
        uses: actions/upload-artifact@v7
        with:
          name: HekaDrop-app-macos-arm64
          path: target/release/HekaDrop.app
          retention-days: 7

  test-linux:
    name: Test + Build (Linux)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            zenity

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Build (release)
        run: cargo build --release

      - name: Build .deb package
        continue-on-error: true
        run: |
          if [ -f scripts/make-deb.sh ]; then
            chmod +x scripts/make-deb.sh
            ./scripts/make-deb.sh
          else
            echo "scripts/make-deb.sh henüz yok — skip"
          fi

      - name: Upload .deb artifact
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: HekaDrop-deb-ubuntu
          path: |
            target/debian/*.deb
            HekaDrop-*.deb
          if-no-files-found: ignore
          retention-days: 7

  test-windows:
    name: Test + Build (Windows)
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        # windows-latest'te chocolatey önceden kurulu; protoc yaygın paket.
        run: choco install protoc -y --no-progress

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Build (release)
        run: cargo build --release

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: HekaDrop-exe-windows
          path: target/release/hekadrop.exe
          if-no-files-found: error
          retention-days: 7
