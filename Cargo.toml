[package]
name = "hekadrop"
version = "0.1.0"
edition = "2021"
description = "Google Quick Share (Nearby Share) protokolünün Rust implementasyonu — cross-platform alıcı/gönderici"
authors = ["destek@sourvice.com"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/YatogamiRaito/HekaDrop"
homepage = "https://github.com/YatogamiRaito/HekaDrop"
readme = "README.md"
keywords = ["quick-share", "nearby-share", "p2p", "file-transfer", "macos"]
categories = ["network-programming", "command-line-utilities"]

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "sync", "signal", "time", "fs"] }
bytes = "1"
prost = "0.13"
mdns-sd = "0.11"
sha2 = "0.10"
hex = "0.4"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
rand = "0.8"
if-addrs = "0.13"
base64 = "0.22"
tray-icon = "0.19"
tao = "0.30"
wry = "0.50"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
parking_lot = "0.12"
p256 = { version = "0.13", features = ["ecdh", "arithmetic"] }
hkdf = "0.12"
hmac = "0.12"
aes = "0.8"
cbc = { version = "0.1", features = ["std"] }
cipher = { version = "0.4", features = ["block-padding"] }
subtle = "2"
elliptic-curve = { version = "0.13", features = ["sec1"] }

[build-dependencies]
prost-build = "0.13"

[dev-dependencies]
# Bütün kripto/proto crate'leri ([dependencies] altında olan p256, aes, cbc, hmac, sha2,
# hkdf, prost, hex, rand, tokio, base64, serde, serde_json, thiserror, parking_lot,
# elliptic-curve) zaten build grafine dahil — integration test'ler o sürümleri doğrudan
# kullanabilir, dev-dependency olarak tekrar eklemeye gerek yok.
#
# Aşağıdaki test-özgü crate'ler mevcut test'ler tarafından doğrudan import edilmiyor, ama
# ileride eklenecek senaryolar için önceden bildirilmiş dependency olarak tutuluyor. Bağlı
# build ağırlığı önemsiz (<1 MB) ve `cargo test` cache'ine yaslanıyor.
pretty_assertions = "1.4"
tokio-test = "0.4"
# criterion = "0.5"  # enable when benchmarks are added

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
